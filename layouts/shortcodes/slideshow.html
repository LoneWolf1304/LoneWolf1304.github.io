{{- /* Unique ID for this specific slideshow instance */ -}}
{{- $id := printf "slideshow-%d" .Ordinal -}}

<div class="slideshow-container" id="{{ $id }}">
  {{- /* Fetch all images in the current page bundle */ -}}
  {{- $images := .Page.Resources.ByType "image" -}}
  
  {{- range $index, $image := $images -}}
    <div class="mySlides fade">
      <img src="{{ $image.RelPermalink }}" alt="{{ $image.Title | default "Slideshow image" }}">
    </div>
  {{- end -}}

  <!-- Navigation Arrows -->
  <button class="prev-btn" aria-label="Previous Slide">&#10094;</button>
  <button class="next-btn" aria-label="Next Slide">&#10095;</button>
</div>

<style>
  /* --- THE MODIFIED CSS SECTIONS START HERE --- */
  .slideshow-container {
    position: relative;
    max-width: 100%;
    margin: 2rem auto;
    overflow: hidden;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    
    /* Forces the slideshow container to always maintain a 16:9 shape */
    aspect-ratio: 16 / 12; 
  }
  .mySlides {
    display: none;
    width: 100%;
    height: 100%;
  }
  .mySlides img {
    width: 100%;
    height: 100%;
    display: block;
    
    /* Centers and crops portrait images cleanly so they don't look warped */
    object-fit: cover;
    object-position: center; 
  }
  /* --- THE MODIFIED CSS SECTIONS END HERE --- */

  /* Navigation Buttons */
  .prev-btn, .next-btn {
    cursor: pointer;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: auto;
    padding: 16px;
    color: white;
    font-weight: bold;
    font-size: 20px;
    transition: 0.3s ease;
    border: none;
    background-color: rgba(0, 0, 0, 0.4);
    user-select: none;
    z-index: 10;
  }
  .next-btn {
    right: 0;
    border-radius: 3px 0 0 3px;
  }
  .prev-btn {
    left: 0;
    border-radius: 0 3px 3px 0;
  }
  .prev-btn:hover, .next-btn:hover {
    background-color: rgba(0, 0, 0, 0.8);
  }
  /* Fading animation */
  .fade {
    animation: fadeAnim 0.5s ease-in-out;
  }
  @keyframes fadeAnim {
    from { opacity: 0.4; }
    to { opacity: 1; }
  }
</style>

<script>
  (function() {
    const container = document.getElementById('{{ $id }}');
    const slides = container.getElementsByClassName('mySlides');
    let slideIndex = 0;

    if (slides.length === 0) return;

    function showSlide(index) {
      if (index >= slides.length) slideIndex = 0;
      if (index < 0) slideIndex = slides.length - 1;
      
      for (let i = 0; i < slides.length; i++) {
        slides[i].style.display = 'none';
      }
      slides[slideIndex].style.display = 'block';
    }

    container.querySelector('.prev-btn').addEventListener('click', () => {
      slideIndex--;
      showSlide(slideIndex);
    });

    container.querySelector('.next-btn').addEventListener('click', () => {
      slideIndex++;
      showSlide(slideIndex);
    });

    // Initialize the first slide
    showSlide(slideIndex);
  })();
</script>
